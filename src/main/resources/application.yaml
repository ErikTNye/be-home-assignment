spring:
  application:
    name: be-home-assignment
  profiles:
    active: mock
  datasource:
    url: jdbc:h2:mem:betsdb;DB_CLOSE_DELAY=-1
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  kafka:
    producer:
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: com.assignment.betsettlement.dto
